networks:
  app-net:
    driver: bridge 

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - api
    networks:
      - app-net

  db:
    image: postgres:15-alpine
    container_name : db
    hostname: postgres
    restart: unless-stopped 
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    command: >
      postgres
      -c log_min_messages=warning     
      -c log_statement=none           
      -c log_duration=off            
      -c log_connections=off
      -c log_disconnections=off 
    volumes:
      - postgres-data:/var/lib/postgresql/data 
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:                                
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5 
      start_period: 20s
    ports:
      - "5432:5432"
    networks:
      - app-net

  redis: 
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      redis-server 
      --requirepass ${REDIS_PASS} 
      --loglevel warning  
      --logfile "" 
      --daemonize no 
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-net
      
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"  # API порт
      - "9001:9001"  # Console порт
    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - app-net

  api:
    build: .
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      IN_DOCKER: 'true'
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src 
      - ./alembic.ini:/app/alembic.ini 
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
      redis: 
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-net



