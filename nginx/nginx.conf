events {
    worker_connections 1024; # максимальное колличество подключений 
}

# HTTP 
http {

    client_max_body_size 25M;
    # Структуа предназначена для храненния публичных маршрутов 
    # это достаточно удобно нам не нужно в каждом сервисе писать middleware для авторизации 
    # можно просто добавлять ендпоинты в каждый сервис а на уровне nginx решать приватный он или нет 
    map "$request_method:$uri" $is_public {
        default 0;

        # Публичные методы аутентификации
        "~^POST:/api/v[0-9]+/auth/login$" 1;
        "~^POST:/api/v[0-9]+/auth/register$" 1;
        "~^POST:/api/v[0-9]+/auth/refresh$" 1;

        # Админка
        "~^GET:/api/v[0-9]+/admin" 1;
        "~^GET:/api/v[0-9]+/admin/" 1;
        "~^POST:/api/v[0-9]+/admin/" 1;
        "~^PUT:/api/v[0-9]+/admin/" 1;
        "~^DELETE:/api/v[0-9]+/admin/" 1;
        
        # Публичный GET для новостей (любая версия)
        "~^GET:/api/v[0-9]+/news$" 1;
        "~^GET:/api/v[0-9]+/news/$" 1;
        "~^GET:/api/v[0-9]+/news/[0-9]+$" 1;
        
        # OPTIONS запросы для любой версии API
        "~^OPTIONS:/api/v[0-9]+" 1;
        
        # Публичные системные маршруты (любая версия)
        "~^GET:/api/v[0-9]+/test$" 1;
        "~^GET:/api/v[0-9]+/health$" 1;
        "~^GET:/api/v[0-9]+/docs$" 1;
        "~^GET:/api/v[0-9]+/openapi.json$" 1;
        "~^GET:/api/v[0-9]+/swagger$" 1;
        "~^GET:/api/v[0-9]+/redoc$" 1;
    }
    
    # Блок UP stream 
    upstream api {
        server api:8000;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Блок Server
    server {
        listen 80;
        server_name 127.0.0.1;

       

        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status": "healthy", "timestamp": "$time_iso8601"}';
        }

        # Эндпоинт для проверки токена
        location = /auth {
            internal;
            
            proxy_pass http://api/api/v1/auth/verify;
            proxy_method POST;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location = /private {
            internal;
            
            auth_request /auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_pass http://api$request_uri;
        }

        location = /public {
            internal;
            proxy_pass http://api$request_uri;
        }


        # Основной location для всех API запросов
        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id,X-Device-Id,X-User-Role' always;
                add_header 'Access-Control-Expose-Headers' 'X-User-Id,X-User-Role,X-Device-Id' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            # Проверяем is_public
            if ($is_public = 1) {
                rewrite ^ /public last;
            }
            # Если не публичный, то приватный
            rewrite ^ /private last;
        }
        
        # Обработка ошибок
        error_page 401 = @error401;
        error_page 403 = @error403;
       
        location @error401 {
            internal;
            add_header Content-Type application/json;
            add_header WWW-Authenticate 'Bearer realm="API", error="invalid_token"';
            return 401 '{"error": "Unauthorized", "code": "AUTH_001", "message": "Invalid or missing authentication token", "timestamp": "$time_iso8601"}';
        }

        location @error403 {
            internal;
            add_header Content-Type application/json;
            return 403 '{"error": "Forbidden", "code": "AUTH_002", "message": "Insufficient permissions", "timestamp": "$time_iso8601"}';
        }
    }
}